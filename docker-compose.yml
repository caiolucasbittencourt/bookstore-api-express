services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalogo-de-livraria-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - catalogo-de-livraria-network

  # MongoDB local (opcional - use se preferir não usar Atlas)
  # Para usar: mude DB_CONNECTION_STRING no .env para mongodb://mongo:27017/catalogo-de-livraria
  # e rode: npm run docker:up:local (a api ja aguarda o healthcheck do mongo)
  mongo:
    image: mongo:7
    container_name: catalogo-de-livraria-mongo
    restart: unless-stopped
    profiles:
      - local-db
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - catalogo-de-livraria-network

networks:
  catalogo-de-livraria-network:
    driver: bridge

volumes:
  mongo-data:
